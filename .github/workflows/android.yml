name: Build Android bundle (TWA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Restore signing keystore (if provided)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/android.keystore
      - name: Build .aab
        working-directory: android
        env:
          KS_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          bubblewrap init --manifest ./twa-manifest.json --skipPwaValidation || true
          bubblewrap build --skipPwaValidation ${KS_PASSWORD:+--keystorePassword="$KS_PASSWORD"} ${KEY_PASSWORD:+--signingKeyPassword="$KEY_PASSWORD"}
      - uses: actions/upload-artifact@v4
        with:
          name: caremate-aab
          path: |
            android/*.aab
            android/*.apk
          if-no-files-found: error
