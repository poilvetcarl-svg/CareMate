<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found, CareMate</title>
  <link rel="icon" type="image/png" href="/static/img/favicon-64.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{--coral:#FF6B6B;--orange:#FF8E53;--ink:#1A0A00;--muted:#9a7a5e}
    *{margin:0;box-sizing:border-box;font-family:'DM Sans',sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
         background:linear-gradient(135deg,#fff6f2,#ffe9e1);text-align:center}
    .wrap{max-width:440px}
    .logo{font-size:22px;font-weight:900;color:var(--ink);letter-spacing:-.5px;margin-bottom:36px}
    .logo span{color:var(--coral)}
    .code{font-size:84px;font-weight:900;line-height:1;letter-spacing:-3px;
          background:linear-gradient(135deg,var(--coral),var(--orange));-webkit-background-clip:text;background-clip:text;color:transparent}
    h1{font-size:22px;font-weight:900;color:var(--ink);margin:14px 0 8px}
    p{font-size:14.5px;color:var(--muted);line-height:1.55;margin-bottom:26px}
    .btn{display:inline-block;background:linear-gradient(135deg,var(--coral),var(--orange));color:#fff;
         text-decoration:none;font-weight:800;font-size:14.5px;padding:13px 26px;border-radius:13px;
         box-shadow:0 14px 30px -10px rgba(255,107,107,.5)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Care<span>Mate</span></div>
    <div class="code">404</div>
    <h1>We couldn't find that page</h1>
    <p>The link may be broken or the page may have moved. Let's get you back to looking after your health.</p>
    <a href="/" class="btn">Back to home</a>
  </div>
</body>
</html>
