<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline, CareMate</title>
  <link rel="icon" type="image/png" href="/static/img/favicon-64.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{--coral:#FF6B6B;--orange:#FF8E53;--ink:#1A0A00;--muted:#9a7a5e}
    *{margin:0;box-sizing:border-box;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
         background:linear-gradient(135deg,#fff6f2,#ffe9e1);text-align:center}
    .wrap{max-width:400px}
    .logo{font-size:22px;font-weight:900;color:var(--ink);letter-spacing:-.5px;margin-bottom:30px}
    .logo span{color:var(--coral)}
    .ic{margin-bottom:6px}
    h1{font-size:22px;font-weight:900;color:var(--ink);margin:10px 0 8px}
    p{font-size:14.5px;color:var(--muted);line-height:1.55;margin-bottom:24px}
    .btn{display:inline-block;background:linear-gradient(135deg,var(--coral),var(--orange));color:#fff;
         text-decoration:none;font-weight:800;font-size:14.5px;padding:13px 26px;border-radius:13px;cursor:pointer;border:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Care<span>Mate</span></div>
    <div class="ic"><svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#FF6B6B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M9 17a3 3 0 0 1 5 0"/><path d="M6.5 13.5a7 7 0 0 1 8-1.3"/><path d="M4 10a11 11 0 0 1 5-2.5M20 10a11 11 0 0 0-8-3"/></svg></div>
    <h1>You're offline</h1>
    <p>CareMate needs a connection for this page. Check your internet and try again.</p>
    <button class="btn" onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
