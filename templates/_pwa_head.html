<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#FF6B6B" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="CareMate" />
<link rel="apple-touch-icon" href="/static/img/favicon-192.png" />
<script>
(function(){
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){ navigator.serviceWorker.register('/sw.js').catch(function(){}); });
  }
  var deferred = null;
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault(); deferred = e;
    if (document.getElementById('cm-install')) return;
    var b = document.createElement('button');
    b.id = 'cm-install'; b.type = 'button'; b.textContent = 'Install app';
    b.setAttribute('aria-label', 'Install the CareMate app');
    b.style.cssText = 'position:fixed;right:16px;bottom:16px;z-index:9999;background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;border:none;border-radius:24px;padding:12px 20px;font:700 14px/1 "DM Sans",sans-serif;box-shadow:0 10px 26px rgba(255,107,107,.45);cursor:pointer';
    b.onclick = function(){ b.remove(); if (deferred) { deferred.prompt(); deferred = null; } };
    document.body.appendChild(b);
  });
  window.addEventListener('appinstalled', function(){ var b = document.getElementById('cm-install'); if (b) b.remove(); });
})();
</script>
