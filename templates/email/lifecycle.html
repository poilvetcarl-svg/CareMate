<!DOCTYPE html>
<html>
<body style="margin:0;padding:0;background:#FFF6F2;font-family:'Helvetica Neue',Arial,sans-serif">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#FFF6F2;padding:28px 0">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;overflow:hidden">
        <tr><td style="background:linear-gradient(135deg,#FF6B6B,#FF8E53);padding:22px 32px">
          <span style="font-size:20px;font-weight:800;color:#ffffff">CareMate</span>
        </td></tr>
        <tr><td style="padding:30px 32px 8px">
          <div style="font-size:19px;font-weight:800;color:#1A0A00;line-height:1.35">{{ heading }}</div>
        </td></tr>
        <tr><td style="padding:10px 32px 4px">
          <div style="font-size:14.5px;color:#5b4636;line-height:1.65">{{ body }}</div>
        </td></tr>
        <tr><td style="padding:22px 32px 30px">
          <a href="{{ cta_url }}" style="display:inline-block;background:#FF6B6B;color:#ffffff;text-decoration:none;font-size:14.5px;font-weight:700;padding:13px 26px;border-radius:12px">{{ cta_label }}</a>
        </td></tr>
        <tr><td style="padding:16px 32px 24px;border-top:1px solid #F5E8E0">
          <div style="font-size:11px;color:#9a8477;line-height:1.6">
            You are receiving this because you created a CareMate account. CareMate is for informational purposes and does not replace professional medical advice.
            Reply to this email if you prefer not to receive these updates. · <a href="https://mycaremate.me/privacy" style="color:#9a8477">Privacy</a>
          </div>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
